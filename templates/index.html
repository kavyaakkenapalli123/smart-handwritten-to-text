<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI OCR Web App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container main-container">

        <div class="card shadow-lg p-5">

            <h1 class="title">
                AI Image to Text & Handwritten OCR
            </h1>

            <p class="subtitle">
                Professional OCR Web Application
            </p>

            <form method="POST" enctype="multipart/form-data">

                <div class="mb-4">

                    <label class="form-label">
                        Upload Image
                    </label>

                    <input
                        type="file"
                        class="form-control"
                        name="image"
                        required
                    >

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Select OCR Mode
                    </label>

                    <select class="form-select" name="mode">

                        <option value="printed">
                            Printed Text OCR
                        </option>

                        <option value="handwritten">
                            Handwritten OCR
                        </option>

                        <option value="easyocr">
                            Deep Learning OCR (EasyOCR)
                        </option>

                    </select>

                </div>

                <button type="submit" class="btn btn-custom w-100">

                    Extract Text

                </button>

            </form>

            {% if text %}

            <div class="result-box mt-5">

                <h4>Extracted Text</h4>

                <textarea class="form-control" rows="12">{{ text }}</textarea>

            </div>

            {% endif %}

        </div>

    </div>

</body>

</html>
